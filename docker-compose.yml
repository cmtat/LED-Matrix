services:
  matrix-v2:
    build: .
    container_name: matrix-v2
    network_mode: host
    restart: unless-stopped
    environment:
      - PUBLIC_HOST=192.168.1.252
      - FLASK_PORT=5050
      - PIXLET_PORT=8080
      - BROWSER_PIXLET_URL=http://192.168.1.252:8080/
      - ESP32_FRAME_URL=http://192.168.1.252:5050/frame.rgb565
      - MATRIX_WIDTH=64
      - MATRIX_HEIGHT=32
      - DATA_DIR=/app/data
    volumes:
      - matrix-v2-data:/app/data

volumes:
  matrix-v2-data:
