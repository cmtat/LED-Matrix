services:
  matrix-v2:
    build: .
    container_name: matrix-v2
    network_mode: host
    restart: unless-stopped
    environment:
      - PUBLIC_HOST=192.168.1.252
      - FLASK_PORT=5050
      - PIXLET_PORT=8080
      - PIXLET_INTERNAL_PORT=18080
      - BROWSER_PIXLET_URL=http://192.168.1.252:8080/
      - ESP32_FRAME_URL=http://192.168.1.252:5050/frame.rgb565
      - MATRIX_WIDTH=64
      - MATRIX_HEIGHT=32
      - TARGET_STREAM_FPS=30
      - STREAM_SPIKE_LOG_MS=50
      - STREAM_STATS_LOG_SECONDS=5
      - STREAM_SOCKET_SNDBUF=262144
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=8
      - GUNICORN_TIMEOUT=0
      - GUNICORN_KEEPALIVE=75
      - DATA_DIR=/app/data
    volumes:
      - matrix-v2-data:/app/data

volumes:
  matrix-v2-data:
